name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: support_tickets_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci_user -d support_tickets_test"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10

    defaults:
      run:
        working-directory: server

    env:
      DATABASE_URL: postgresql://ci_user:ci_password@localhost:5432/support_tickets_test?schema=public
      JWT_SECRET: ci-test-secret-at-least-32-characters-long
      JWT_EXPIRES_IN: 1h
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Run tests
        run: npm test
